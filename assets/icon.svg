<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- C: eighth note whose head IS a circular sync arrow, white on gradient tile -->
  <defs>
    <linearGradient id="tileC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB5C74"/>
      <stop offset="1" stop-color="#FA233B"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#tileC)"/>
  <!-- ring head with gap upper-left, arrowhead pointing into gap -->
  <path d="M 106.8 142.5 A 30 30 0 1 1 82.5 166.8" stroke="#fff" stroke-width="16" fill="none" stroke-linecap="butt"/>
  <path d="M 87.9 141.3 L 96.0 173.4 L 66.8 167.9 Z" fill="#fff"/>
  <!-- stem + flag -->
  <rect x="136" y="58" width="14" height="118" rx="7" fill="#fff"/>
  <path d="M 143 64 C 178 76, 186 102, 175 130" stroke="#fff" stroke-width="14" fill="none" stroke-linecap="round"/>
</svg>
