name: Release

# Triggered by pushing a version tag (e.g. `v0.1.0`), per issue #10's "pushing a version tag
# produces a GitHub release with Velopack installer artifacts" acceptance criterion. Unlike ci.yml
# (which runs on every push/PR to main), this only runs for an intentional, human-initiated tag
# push — nothing here fires on ordinary commits.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required so `vpk upload github` can create the GitHub Release and upload assets

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release partway through publishing assets

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Keep in sync with src/Samklang/Samklang.csproj's Velopack PackageReference version — vpk pack
  # must match the Velopack NuGet package the app was built against.
  VPK_VERSION: 1.2.0

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive version from tag
        id: get-version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: |
            src/Samklang/Samklang.csproj
            tests/Samklang.Tests/Samklang.Tests.csproj

      - name: Restore
        run: dotnet restore Samklang.sln

      - name: Build (Release)
        run: dotnet build Samklang.sln --configuration Release --no-restore

      # Belt-and-suspenders: a tag push doesn't necessarily mean ci.yml already ran green against
      # this exact commit (e.g. a tag pushed on top of an already-merged, already-tested commit is
      # the common case, but nothing enforces it), so a release build re-verifies before packaging.
      - name: Test (Release)
        run: dotnet test Samklang.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      # -p:Version=... overrides the csproj's <Version> so the assembly embedded in this release
      # (and therefore VersionInfo.CurrentDisplay shown in the tray/UI) matches the pushed tag.
      - name: Publish app
        run: >
          dotnet publish src/Samklang/Samklang.csproj
          --configuration Release
          --output publish
          --runtime win-x64
          --self-contained true
          -p:Version=${{ steps.get-version.outputs.version }}

      - name: Install vpk
        run: dotnet tool install -g vpk --version ${{ env.VPK_VERSION }}

      # Pulls the previous release's assets so vpk can compute a delta update package alongside
      # the full one. On the very first-ever release (no prior GitHub release exists) this has
      # nothing to download — expected, and vpk proceeds to a full-only package; see
      # WINDOWS_INTEGRATION_TESTING_HANDOFF.md for what a human should confirm on that first tag.
      - name: Download previous release (for delta updates)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack Velopack release
        run: >
          vpk pack
          --packId Samklang
          --packVersion ${{ steps.get-version.outputs.version }}
          --packDir publish
          --mainExe Samklang.exe

      - name: Publish to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --publish
          --releaseName "Samklang ${{ steps.get-version.outputs.version }}"
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
