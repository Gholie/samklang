name: Release

# release-please turns Conventional Commits on main into a release PR (semver bump + changelog);
# merging that PR makes release-please create a *draft* GitHub Release. The build job below runs
# in this same workflow run — deliberately, because GitHub does NOT fire `on: release` workflow
# triggers for draft releases — and builds the Velopack artifacts, attaches them to the draft, and
# only then flips it to published. The draft stage is load-bearing twice over: a release is never
# visible (to users, or to the app's own GithubSource update check, which ignores drafts) until
# its artifacts are complete, and this repository has immutable releases enabled — GitHub attests
# every asset automatically at publish time and no asset can be added or changed afterwards, so
# attach-then-publish is the only order that works at all.
on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never cancel a release partway through publishing assets

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Keep in sync with src/Samklang/Samklang.csproj's Velopack PackageReference version — vpk pack
  # must match the Velopack NuGet package the app was built against.
  VPK_VERSION: 1.2.0

jobs:
  release-please:
    runs-on: ubuntu-latest
    # release-please acts entirely through the minted app token below, so the job's own
    # GITHUB_TOKEN needs no write access at all.
    permissions:
      contents: read
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      # release-please runs with a GitHub App installation token instead of the default
      # GITHUB_TOKEN, because events created *by* GITHUB_TOKEN never trigger other workflows —
      # with it, the release PRs release-please opens would get no ci.yml run. The app token has
      # no such restriction, so release PRs are CI-gated like any other PR. The `app-id` input
      # accepts the app's client ID.
      - name: Mint release app token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}

  # Only runs on the push that merged a release PR (release_created), i.e. once per release.
  # Note: because the release PR is created with the default GITHUB_TOKEN, ci.yml does not run on
  # it — the Test step here is therefore the CI gate for the release commit, not a redundancy.
  build-and-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: write # upload assets to the draft Release and publish it
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: |
            src/Samklang/Samklang.csproj
            tests/Samklang.Tests/Samklang.Tests.csproj

      - name: Restore
        run: dotnet restore Samklang.sln

      - name: Build (Release)
        run: dotnet build Samklang.sln --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test Samklang.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      # The release PR already bumped the csproj's <Version> (release-please's extra-files
      # updater), so this -p:Version override is belt-and-suspenders: it guarantees the assembly
      # version matches the Release being published even if the two ever drift.
      - name: Publish app
        run: >
          dotnet publish src/Samklang/Samklang.csproj
          --configuration Release
          --output publish
          --runtime win-x64
          --self-contained true
          -p:Version=${{ needs.release-please.outputs.version }}

      - name: Install vpk
        run: dotnet tool install -g vpk --version ${{ env.VPK_VERSION }}

      # Pulls the previous *published* release's assets so vpk can compute a delta update package
      # alongside the full one (drafts are ignored, so an aborted earlier attempt can't poison the
      # delta base). On the very first release there is nothing to download — expected, and vpk
      # proceeds to a full-only package; see WINDOWS_INTEGRATION_TESTING_HANDOFF.md.
      - name: Download previous release (for delta updates)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ github.token }}
        continue-on-error: true

      - name: Pack Velopack release
        run: >
          vpk pack
          --packId Samklang
          --packVersion ${{ needs.release-please.outputs.version }}
          --packDir publish
          --mainExe Samklang.exe
          --outputDir Releases

      # Everything vpk emitted goes onto the Release — the updater (GithubSource) reads the
      # release's assets, so the .nupkg/setup/manifest files must all land there, not just the
      # installer. `gh` resolves draft releases by their tag name even though the git tag itself
      # is only created at publish time.
      - name: Attach artifacts to the draft release
        shell: bash
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" Releases/* --clobber --repo ${{ github.repository }}

      # Publishing creates the git tag and, with immutable releases enabled on this repository,
      # freezes the asset list and generates GitHub's release attestation for every asset —
      # verifiable with `gh attestation verify <file> --repo <owner/repo>
      # --predicate-type https://in-toto.io/attestation/release/v0.1`.
      - name: Publish the release
        shell: bash
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false --repo ${{ github.repository }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults
